<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Quiz App - Ứng dụng trả lời câu hỏi điền từ, hỗ trợ đa ngôn ngữ">
  <title>QuizMaster - Fill-in-the-Blank Quiz App</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <!-- Top Navigation Bar -->
  <nav class="navbar" id="navbar">
    <div class="navbar-brand">
      <span class="brand-icon">⚡</span>
      <span class="brand-text">QuizMaster</span>
    </div>
    <div class="navbar-actions">
      <button class="nav-btn primary" id="btn-play" onclick="App.navigate('play')">
        <span class="btn-icon">▶</span>
        <span data-i18n="nav.play">Chơi Quiz</span>
      </button>
      <button class="nav-btn success" id="btn-create" onclick="App.createNewQuiz()">
        <span class="btn-icon">＋</span>
        <span data-i18n="nav.create">Tạo Quiz</span>
      </button>
      <button class="nav-btn info" id="btn-import" onclick="App.navigate('import')">
        <span class="btn-icon">📥</span>
        <span data-i18n="nav.import">Import</span>
      </button>
      <button class="nav-btn warning" id="btn-settings" onclick="App.navigate('settings')">
        <span class="btn-icon">⚙</span>
        <span data-i18n="nav.settings">Settings</span>
      </button>
      <button class="nav-btn accent" id="btn-code" onclick="App.showCodeModal()">
        <span class="btn-icon">🔑</span>
        <span data-i18n="nav.enterCode">Nhập mã Quiz</span>
      </button>
    </div>
    <button class="navbar-toggle" id="navbar-toggle" onclick="App.toggleMobileMenu()">☰</button>
  </nav>

  <!-- Mobile Menu Overlay -->
  <div class="mobile-menu-overlay" id="mobile-menu-overlay" onclick="App.toggleMobileMenu()"></div>
  <div class="mobile-menu" id="mobile-menu">
    <button class="mobile-nav-btn" onclick="App.navigate('play'); App.toggleMobileMenu();">
      <span>▶</span> <span data-i18n="nav.play">Chơi Quiz</span>
    </button>
    <button class="mobile-nav-btn" onclick="App.createNewQuiz(); App.toggleMobileMenu();">
      <span>＋</span> <span data-i18n="nav.create">Tạo Quiz</span>
    </button>
    <button class="mobile-nav-btn" onclick="App.navigate('import'); App.toggleMobileMenu();">
      <span>📥</span> <span data-i18n="nav.import">Import</span>
    </button>
    <button class="mobile-nav-btn" onclick="App.navigate('settings'); App.toggleMobileMenu();">
      <span>⚙</span> <span data-i18n="nav.settings">Settings</span>
    </button>
    <button class="mobile-nav-btn" onclick="App.showCodeModal(); App.toggleMobileMenu();">
      <span>🔑</span> <span data-i18n="nav.enterCode">Nhập mã Quiz</span>
    </button>
  </div>

  <!-- Main Content Area -->
  <main class="main-content" id="main-content">
    <!-- Content will be rendered by JS router -->
  </main>

  <!-- Modal Overlay -->
  <div class="modal-overlay" id="modal-overlay" onclick="App.closeModal()"></div>
  <div class="modal" id="modal">
    <div class="modal-header">
      <h3 class="modal-title" id="modal-title"></h3>
      <button class="modal-close" onclick="App.closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-footer" id="modal-footer"></div>
  </div>

  <!-- Toast Container -->
  <div class="toast-container" id="toast-container"></div>

  <script src="/js/i18n.js"></script>
  <script src="/js/components.js"></script>
  <script src="/js/quiz-editor.js"></script>
  <script src="/js/vocab-editor.js"></script>
  <script src="/js/quiz-import.js"></script>
  <script src="/js/quiz-player.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
